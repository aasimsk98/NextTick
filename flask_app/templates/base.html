<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NextTick — Market Forecasting{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <!-- Resolve theme before first paint to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('nexttick-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <!-- Chart.js for history visualisation -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">NextTick</span>
      <span class="brand-tag">CS 6140 · ML Market Forecasting</span>
    </div>
    <nav class="site-nav">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/health" class="nav-link nav-link--subtle" target="_blank" rel="noopener">Status</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light / dark mode"></button>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-left">
      <span>NextTick · Pratham Mahajan · Mohammad Aasim Shaikh</span>
    </div>
    <div class="footer-right">
      <span>Prof. Ehsan Elhamifar · Northeastern University</span>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
